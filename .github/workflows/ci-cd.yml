name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [created]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./node_modules/*" -exec jsonlint {} \; || true

      - name: Validate YAML files
        run: |
          pip install yamllint
          yamllint . -d relaxed

      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/link-check-config.json'

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install OpenClaw (if needed)
        run: |
          echo "OpenClaw testing would go here"
          # npm install -g @openclaw/cli
          # openclaw --version

      - name: Run workspace validation
        run: |
          echo "Validating workspace structure..."
          test -d workspace && echo "✅ workspace directory exists" || echo "⚠️ workspace directory missing"
          test -f workspace/README.md && echo "✅ README.md exists" || echo "⚠️ README.md missing"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Create build artifacts
        run: |
          mkdir -p dist
          cp -r workspace dist/ 2>/dev/null || true
          cp README.md dist/
          cp LICENSE dist/
          echo "Build completed at $(date)" > dist/BUILD_INFO

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-workspace
          path: dist/
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package
        id: version
        run: |
          VERSION=$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
      - name: Notify success
        if: needs.build.result == 'success'
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Artifacts are available for download"

      - name: Notify failure
        if: needs.build.result == 'failure'
        run: |
          echo "❌ Build failed!"
          echo "Please check the logs for details"
